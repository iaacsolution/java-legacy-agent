repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: java-breaking-change
        name: Java Breaking Change Detector (AST + MD5 Cache)
        entry: hooks/impact-check.sh
        language: script
        files: \.java$
        pass_filenames: true
        stages: [pre-commit]
        verbose: true
