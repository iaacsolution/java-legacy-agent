version: "3.9"

services:

  # ── vLLM — inférence GPU locale, OpenAI-compatible ───
  # Continuous batching : parallélise réellement les N workers Java.
  # Nécessite nvidia-container-toolkit + GPU avec ≥8 GB VRAM.
  # Désactiver en commentant ce bloc et en activant "ollama" ci-dessous.
  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8000:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command: >
      --model Qwen/Qwen2.5-Coder-7B-Instruct
      --tensor-parallel-size 1
      --max-model-len 4096
      --gpu-memory-utilization 0.85
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ── Ollama — fallback CPU (sérialise les requêtes LLM) ─
  # Activer si pas de GPU disponible. Mettre AGENT_WORKERS=1.
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   environment:
  #     - OLLAMA_KEEP_ALIVE=24h
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped

  # ── Agent Java LangChain4j ───────────────────────────
  java-agent:
    build: ./agent
    environment:
      # vLLM (GPU local, parallélisme réel) — priorité 1
      - VLLM_BASE_URL=http://vllm:8000
      # Anthropic cloud — priorité 2 si pas de GPU
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Ollama CPU — priorité 3 (fallback, mettre AGENT_WORKERS=1)
      - OLLAMA_BASE_URL=http://ollama:11434
      - AGENT_WORKERS=4
      - PUSHGATEWAY_URL=http://pushgateway:9091
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://phoenix:4317
    volumes:
      - ./logs:/app/logs
    depends_on:
      - vllm
      - pushgateway
    restart: "no"

  # ── Prometheus Pushgateway — métriques batch agent ───
  pushgateway:
    image: prom/pushgateway:latest
    ports:
      - "9092:9091"
    restart: unless-stopped

  # ── Prometheus — scrape du Pushgateway ───────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9093:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  # ── Grafana — dashboards agent ────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD manquant, voir .env.example}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Open WebUI — interface chat avec les modèles ──────
  # Pointe sur vLLM (OpenAI-compatible) par défaut, comme LlmModelFactory.
  # Pour revenir sur Ollama : réactiver le service ci-dessus, remplacer
  # OPENAI_API_BASE_URLS par OLLAMA_BASE_URL=http://ollama:11434 et
  # ajouter "ollama" à depends_on.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3002:8080"
    environment:
      - OPENAI_API_BASE_URLS=http://vllm:8000/v1
      - OPENAI_API_KEYS=EMPTY
    volumes:
      - webui_data:/app/backend/data
    depends_on:
      - vllm
    restart: unless-stopped

  # ── Arize Phoenix — traçabilité et observabilité LLM ──
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"   # UI traces LLM
      - "4317:4317"   # OTLP gRPC (OpenTelemetry ingest)
    environment:
      - PHOENIX_WORKING_DIR=/phoenix
    volumes:
      - phoenix_data:/phoenix
    restart: unless-stopped

  # ── Apache Airflow — orchestration de workflows ────────
  airflow:
    build: ./airflow
    command: standalone
    ports:
      - "8083:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD manquant, voir .env.example}
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY manquant, voir .env.example}
    volumes:
      - airflow_data:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
    restart: unless-stopped

volumes:
  vllm_cache:
  ollama_data:
  webui_data:
  grafana_data:
  phoenix_data:
  airflow_data:
